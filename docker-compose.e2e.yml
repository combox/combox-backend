services:
  postgres:
    image: postgres:16-alpine
    container_name: combox-backend-e2e-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: combox
      POSTGRES_USER: combox
      POSTGRES_PASSWORD: combox_local_password
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U combox -d combox"]
      interval: 5s
      timeout: 3s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    container_name: combox-backend-e2e-valkey
    restart: unless-stopped
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

